server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Serve admin panel at /admin (without .html)
    location = /admin {
        try_files /admin.html =404;
    }

    # Serve my-links page (without .html)
    location = /my-links {
        try_files /my-links.html =404;
    }

    # Serve terms page (without .html)
    location = /terms {
        try_files /terms.html =404;
    }

    # Proxy API requests to backend
    location /api/ {
        proxy_pass http://backend:80/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy QR code requests
    location /qr/ {
        proxy_pass http://backend:80/qr/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy short code redirects (single path segment, not a file)
    location ~ ^/([a-zA-Z0-9_-]+)$ {
        # Skip files that actually exist (like i18n/*.json)
        try_files $uri @redirect;
    }

    location @redirect {
        proxy_pass http://backend:80$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Service worker must never be cached (or browsers keep the old one)
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires off;
    }

    # Webmanifest revalidates often
    location = /site.webmanifest {
        add_header Cache-Control "no-cache";
        expires off;
    }

    # i18n JSON files must revalidate so new translation keys reach users
    location ~* ^/i18n/.*\.json$ {
        add_header Cache-Control "no-cache";
        expires off;
    }

    # CSS and JS revalidate (they change without filename hashing)
    location ~* \.(css|js)$ {
        add_header Cache-Control "public, max-age=0, must-revalidate";
        expires off;
    }

    # Images and fonts rarely change — long cache is fine
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }
}
