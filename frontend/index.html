<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenShortener – Free & Open-Source URL Shortener</title>
    <meta name="description" content="OpenShortener is a free, open-source URL shortener. Shorten long links instantly, track clicks, and generate QR codes. No ads, no tracking, AGPL-3.0 licensed.">
    <meta name="keywords" content="url shortener, link shortener, open source, free, shorten url, qr code, click tracking">
    <link rel="canonical" href="https://short.opensource.dev.br/">
    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="OpenShortener – Free & Open-Source URL Shortener">
    <meta property="og:description" content="Shorten long links instantly, track clicks, and generate QR codes. Free and open-source.">
    <meta property="og:url" content="https://short.opensource.dev.br/">
    <meta property="og:image" content="https://short.opensource.dev.br/assets/favicon-96.png">
    <meta property="og:site_name" content="OpenShortener">
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="OpenShortener – Free & Open-Source URL Shortener">
    <meta name="twitter:description" content="Shorten long links instantly, track clicks, and generate QR codes. Free and open-source.">
    <meta name="twitter:image" content="https://short.opensource.dev.br/assets/favicon-96.png">
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16.png">
    <link rel="apple-touch-icon" sizes="96x96" href="/assets/apple-touch-icon.png">
    <link rel="stylesheet" href="styles.css">
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "OpenShortener",
        "url": "https://short.opensource.dev.br",
        "description": "Free, open-source URL shortener with click tracking and QR code generation.",
        "applicationCategory": "UtilitiesApplication",
        "operatingSystem": "All",
        "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "USD"
        },
        "license": "https://www.gnu.org/licenses/agpl-3.0.html"
    }
    </script>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <a href="/" class="logo">OpenShortener</a>
        </div>
        <div class="header-right">
            <div class="lang-dropdown">
                <button id="lang-toggle" class="btn-icon" title="Language" aria-label="Language">
                    <span id="lang-icon">🇧🇷</span>
                    <span class="lang-arrow">▾</span>
                </button>
                <div id="lang-menu" class="lang-menu hidden"></div>
            </div>
            <button id="theme-toggle" class="btn-icon" data-i18n-title="header.themeToggle" aria-label="Toggle theme">
                <span id="theme-icon">🌙</span>
            </button>
            <div id="auth-area"></div>
        </div>
    </header>

    <!-- Main -->
    <main class="main">
        <!-- Shorten form -->
        <section class="shorten-section">
            <h1 data-i18n="hero.title"></h1>
            <p class="subtitle" data-i18n="hero.subtitle"></p>

            <form id="shorten-form" class="shorten-form">
                <div class="input-group">
                    <input type="url" id="url-input" data-i18n-placeholder="form.urlPlaceholder" required>
                    <button type="submit" class="btn-primary" id="shorten-btn" data-i18n="form.shortenBtn"></button>
                </div>
                <div class="optional-fields">
                    <input type="text" id="alias-input" data-i18n-placeholder="form.aliasPlaceholder" data-i18n-title="form.aliasTitle" pattern="[a-zA-Z0-9_\-]+">
                </div>
                <div class="expiration-toggle">
                    <label class="switch-label">
                        <span class="switch">
                            <input type="checkbox" id="expires-toggle">
                            <span class="switch-slider"></span>
                        </span>
                        <span data-i18n="form.enableExpiration"></span>
                    </label>
                    <input type="datetime-local" id="expires-input" class="hidden" data-i18n-title="form.expiresTitle">
                </div>
            </form>

            <!-- Result -->
            <div id="result" class="result hidden">
                <div class="result-url">
                    <a id="short-url" href="#" target="_blank" rel="noopener"></a>
                    <button id="copy-btn" class="btn-secondary" data-i18n="form.copyBtn"></button>
                </div>
                <div class="result-qr">
                    <img id="qr-img" alt="QR Code" width="200" height="200">
                </div>
            </div>
        </section>

        <!-- My URLs (authenticated) -->
        <div id="my-urls-link" class="my-urls-link hidden">
            <a href="/my-links" class="btn-secondary" data-i18n="myLinks.viewAll"></a>
        </div>
    </main>

    <!-- Auth Modal -->
    <div id="auth-modal" class="modal hidden">
        <div class="modal-backdrop" data-close-modal></div>
        <div class="modal-content">
            <button class="modal-close" data-close-modal>&times;</button>
            <div id="auth-tabs" class="auth-tabs">
                <button class="auth-tab active" data-tab="login" data-i18n="auth.loginTab"></button>
                <button class="auth-tab" data-tab="register" data-i18n="auth.registerTab"></button>
            </div>

            <!-- Login -->
            <form id="login-form" class="auth-form">
                <input type="email" name="email" data-i18n-placeholder="auth.emailPlaceholder" required>
                <input type="password" name="password" data-i18n-placeholder="auth.passwordPlaceholder" required minlength="8">
                <button type="submit" class="btn-primary" data-i18n="auth.loginBtn"></button>
                <p id="login-error" class="form-error hidden"></p>
            </form>

            <!-- Register -->
            <form id="register-form" class="auth-form hidden">
                <input type="email" name="email" data-i18n-placeholder="auth.emailPlaceholder" required>
                <input type="password" name="password" data-i18n-placeholder="auth.passwordHint" required minlength="8">
                <button type="submit" class="btn-primary" data-i18n="auth.registerBtn"></button>
                <p id="register-error" class="form-error hidden"></p>
            </form>
        </div>
    </div>

    <!-- Change Password Modal -->
    <div id="password-modal" class="modal hidden">
        <div class="modal-backdrop" data-close-password></div>
        <div class="modal-content">
            <button class="modal-close" data-close-password>&times;</button>
            <h2 data-i18n="auth.changePasswordTitle" style="margin-bottom:1.25rem"></h2>
            <form id="password-form" class="auth-form">
                <input type="password" name="current_password" data-i18n-placeholder="auth.currentPasswordPlaceholder" required minlength="8">
                <input type="password" name="new_password" data-i18n-placeholder="auth.newPasswordPlaceholder" required minlength="8">
                <input type="password" name="confirm_password" data-i18n-placeholder="auth.confirmPasswordPlaceholder" required minlength="8">
                <button type="submit" class="btn-primary" data-i18n="auth.changePasswordBtn"></button>
                <p id="password-error" class="form-error hidden"></p>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-links">
            <a href="/terms.html" data-i18n="footer.terms"></a>
            <a href="https://github.com/traue/OpenShortener" target="_blank" rel="noopener">GitHub</a>
        </div>
        <div class="donate">
            ☕ <a href="https://buymeacoffee.com/traue" target="_blank" rel="noopener" data-i18n="footer.donate"></a>
        </div>
        <p class="footer-copy" data-i18n="footer.copy"></p>     
    </footer>

    <script src="app.js"></script>
</body>
</html>
