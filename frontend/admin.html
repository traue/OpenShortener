<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin · OpenShortener</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="/favicon.ico" sizes="48x48">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <a href="/" class="logo">OpenShortener</a>
            <span class="admin-badge" data-i18n="admin.badge"></span>
        </div>
        <div class="header-right">
            <div class="lang-dropdown">
                <button id="lang-toggle" class="btn-icon" title="Language" aria-label="Language">
                    <span id="lang-icon">🇧🇷</span>
                    <span class="lang-arrow">▾</span>
                </button>
                <div id="lang-menu" class="lang-menu hidden"></div>
            </div>
            <button id="theme-toggle" class="btn-icon" data-i18n-title="header.themeToggle" aria-label="Toggle theme">
                <span id="theme-icon">🌙</span>
            </button>
            <div id="admin-area"></div>
        </div>
    </header>

    <!-- Login -->
    <section id="admin-login" class="admin-login-section">
        <div class="admin-login-card">
            <h1 data-i18n="admin.loginTitle"></h1>
            <p class="subtitle" data-i18n="admin.loginSubtitle"></p>
            <form id="admin-login-form" class="auth-form">
                <input type="email" name="email" data-i18n-placeholder="auth.emailPlaceholder" required autocomplete="email">
                <input type="password" name="password" data-i18n-placeholder="auth.passwordPlaceholder" required>
                <button type="submit" class="btn-primary" data-i18n="auth.loginBtn"></button>
                <p id="admin-login-error" class="form-error hidden"></p>
            </form>
        </div>
    </section>

    <!-- Dashboard -->
    <section id="admin-dashboard" class="admin-dashboard hidden">
        <!-- Tabs -->
        <nav class="admin-tabs">
            <button class="admin-tab active" data-panel="users">
                <span class="admin-tab-icon">👥</span>
                <span data-i18n="admin.usersTab"></span>
                <span id="users-count" class="admin-tab-count">0</span>
            </button>
            <button class="admin-tab" data-panel="urls">
                <span class="admin-tab-icon">🔗</span>
                <span data-i18n="admin.linksTab"></span>
                <span id="urls-count" class="admin-tab-count">0</span>
            </button>
        </nav>

        <!-- Users Panel -->
        <div id="panel-users" class="admin-panel">
            <div class="admin-panel-header">
                <h2 data-i18n="admin.usersTitle"></h2>
                <div style="display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap">
                    <div class="admin-search">
                        <input type="text" id="users-search" data-i18n-placeholder="admin.searchPlaceholder">
                    </div>
                    <button class="btn-primary btn-small" id="btn-create-user" data-i18n="admin.createUserBtn"></button>
                </div>
            </div>
            <div class="admin-table-wrap">
                <table class="admin-table" id="users-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th data-i18n="admin.colEmail"></th>
                            <th data-i18n="admin.colStatus"></th>
                            <th data-i18n="admin.colLinks"></th>
                            <th data-i18n="admin.colCreated"></th>
                            <th data-i18n="admin.colActions"></th>
                        </tr>
                    </thead>
                    <tbody id="users-tbody"></tbody>
                </table>
            </div>
            <p id="users-empty" class="admin-empty hidden" data-i18n="admin.noUsers"></p>
        </div>

        <!-- URLs Panel -->
        <div id="panel-urls" class="admin-panel hidden">
            <div class="admin-panel-header">
                <h2 data-i18n="admin.linksTitle"></h2>
                <div style="display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap">
                    <div class="admin-search">
                        <input type="text" id="urls-search" data-i18n-placeholder="admin.searchPlaceholder">
                    </div>
                    <button class="btn-primary btn-small" id="btn-create-url" data-i18n="admin.createUrlBtn"></button>
                </div>
            </div>
            <div class="admin-table-wrap">
                <table class="admin-table" id="urls-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th data-i18n="admin.colOriginalUrl"></th>
                            <th data-i18n="admin.colShortUrl"></th>
                            <th data-i18n="admin.colOwner"></th>
                            <th data-i18n="admin.colClicks"></th>
                            <th data-i18n="admin.colExpires"></th>
                            <th data-i18n="admin.colCreated"></th>
                            <th data-i18n="admin.colActions"></th>
                        </tr>
                    </thead>
                    <tbody id="urls-tbody"></tbody>
                </table>
            </div>
            <p id="urls-empty" class="admin-empty hidden" data-i18n="admin.noLinks"></p>
        </div>
    </section>

    <!-- Create/Edit User Modal -->
    <div id="user-modal" class="modal hidden">
        <div class="modal-backdrop" data-close-user-modal></div>
        <div class="modal-content">
            <button class="modal-close" data-close-user-modal>&times;</button>
            <h2 id="user-modal-title" data-i18n="admin.createUserTitle"></h2>
            <form id="user-modal-form" class="auth-form" style="margin-top:1rem">
                <input type="hidden" id="user-modal-id" value="">
                <input type="email" id="user-modal-email" data-i18n-placeholder="auth.emailPlaceholder" required>
                <input type="password" id="user-modal-password" data-i18n-placeholder="auth.passwordPlaceholder" minlength="8">
                <p id="user-modal-pw-hint" class="form-hint" data-i18n="admin.editPasswordHint"></p>
                <label class="switch-label" style="margin-top:0.25rem">
                    <span class="switch">
                        <input type="checkbox" id="user-modal-admin">
                        <span class="switch-slider"></span>
                    </span>
                    <span data-i18n="admin.isAdminLabel"></span>
                </label>
                <button type="submit" class="btn-primary" id="user-modal-submit" data-i18n="admin.createUserBtn"></button>
                <p id="user-modal-error" class="form-error hidden"></p>
            </form>
        </div>
    </div>

    <!-- Create/Edit URL Modal -->
    <div id="url-modal" class="modal hidden">
        <div class="modal-backdrop" data-close-url-modal></div>
        <div class="modal-content">
            <button class="modal-close" data-close-url-modal>&times;</button>
            <h2 id="url-modal-title" data-i18n="admin.createUrlTitle"></h2>
            <form id="url-modal-form" class="auth-form" style="margin-top:1rem">
                <input type="hidden" id="url-modal-id" value="">
                <input type="url" id="url-modal-url" data-i18n-placeholder="form.urlPlaceholder" required>
                <input type="text" id="url-modal-alias" data-i18n-placeholder="form.aliasPlaceholder" pattern="[a-zA-Z0-9_\-]+">
                <input type="datetime-local" id="url-modal-expires" data-i18n-title="form.expiresTitle">
                <button type="submit" class="btn-primary" id="url-modal-submit" data-i18n="admin.createUrlBtn"></button>
                <p id="url-modal-error" class="form-error hidden"></p>
            </form>
        </div>
    </div>

    <!-- URL Stats Modal -->
    <div id="stats-modal" class="modal hidden">
        <div class="modal-backdrop" data-close-stats></div>
        <div class="modal-content modal-wide">
            <button class="modal-close" data-close-stats>&times;</button>
            <h2 data-i18n="myLinks.statsTitle"></h2>
            <div id="stats-body" class="stats-body">
                <p class="stats-total"><span data-i18n="myLinks.totalClicks"></span>: <strong id="stats-total-count">0</strong></p>
                <div class="stats-chart-wrap">
                    <h3 data-i18n="myLinks.clicksLast30"></h3>
                    <div id="stats-chart" class="stats-chart"></div>
                </div>
                <div class="stats-referers-wrap">
                    <h3 data-i18n="myLinks.topReferers"></h3>
                    <ul id="stats-referers" class="stats-referers"></ul>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p class="footer-copy" data-i18n="footer.copy"></p>
    </footer>

    <script src="admin.js"></script>
</body>
</html>
